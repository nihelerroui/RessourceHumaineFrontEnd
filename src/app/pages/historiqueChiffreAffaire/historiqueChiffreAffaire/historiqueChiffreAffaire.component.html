<div class="container-fluid">
    <app-page-title
        title="Historique chiffre d'affaire"
        [breadcrumbItems]="[
            { label: 'Dashboard', path: '/' },
            { label: 'Historique chiffre affaire', active: true }
        ]"
    ></app-page-title>

    <div class="row">
        <div class="col-12">
            <div ngClass="card">
                <div class="card-body border-bottom">
                    <div class="d-flex align-items-center">
                        <h5 class="mb-0 card-title flex-grow-1">Suivi du Chiffre d'Affaire</h5>
                        <div class="flex-shrink-0 d-flex gap-1">
                            <button class="btn btn-secondary" (click)="resetFilters()">
                                <i class="mdi mdi-filter-remove"></i> Réinitialiser
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Filtres par Client et Année -->
                <div class="card-body border-bottom">
                    <div class="row g-3 align-items-center">
                        <div class="col-xxl-3 col-lg-6">
                            <select class="form-select" [(ngModel)]="selectedClient" (change)="filterHistorique()">
                                <option value="">Sélectionner un Client</option>
                                <option *ngFor="let client of uniqueClients" [value]="client">
                                    {{ client }}
                                </option>
                            </select>
                        </div>
                        <div class="col-xxl-3 col-lg-6">
                            <select class="form-select" [(ngModel)]="selectedYear" (change)="filterHistorique()">
                                <option value="">Sélectionner une Année</option>
                                <option *ngFor="let year of uniqueYears" [value]="year">
                                    {{ year }}
                                </option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Graphique en Barres (Bar Chart) -->
                <div class="card-body">
                    <h4 class="card-title mb-4">Chiffre d'Affaire par Client</h4>
                    <div class="chart-container">
                        <apx-chart class="apex-charts" dir="ltr" [series]="barChart.series" [chart]="barChart.chart"
                            [plotOptions]="barChart.plotOptions" [dataLabels]="barChart.dataLabels" [xaxis]="barChart.xaxis"
                            [colors]="barChart.colors" [grid]="barChart.grid" [title]="barChart.title">
                        </apx-chart>
                    </div>
                </div>

                <div class="card-body">
                    <div class="table-responsive mt-3 d-flex justify-content-center">
                        <table class="table table-hover table-bordered" style="width: 60%;">
                            <thead>
                                <tr>
                                    <th>Client</th>
                                    <th>Montant</th>
                                    <th>Année</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr *ngFor="let item of filteredHistorique">
                                    <td>{{ item.client.nom }}</td>
                                    <td>{{ item.montant | currency:'EUR' }}</td>
                                    <td>{{ item.annee }}</td>
                                </tr>
                                <tr *ngIf="filteredHistorique.length === 0">
                                    <td colspan="3" class="text-center">Aucun chiffre d'affaire trouvé</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>                    
                </div>
            </div>
        </div>
    </div>
</div>
