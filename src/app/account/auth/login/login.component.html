<div class="account-pages my-5 pt-sm-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-6 col-xl-5">
        <div class="card overflow-hidden">
          <div class="bg-primary-subtle">
            <div class="row">
              <div class="col-7">
                <div class="text-primary p-4">
                  <h5 class="text-primary">Bienvenue !</h5>
                  <p>Connectez-vous pour continuer vers Featway.</p>
                </div>
              </div>
              <div class="col-5 align-self-end">
                <img src="assets/images/featway.png" alt="" class="img-fluid" />
              </div>
            </div>
          </div>
          <div class="card-body pt-0">
            <div>
              <a routerLink="/">
                <div class="avatar-md profile-user-wid mb-4">
                  <span class="avatar-title rounded-circle bg-light">
                    <img
                      src="assets/images/logo.svg"
                      alt=""
                      class="rounded-circle"
                      height="34"
                    />
                  </span>
                </div>
              </a>
            </div>
            <div class="p-2">
              <form
                class="form-horizontal"
                [formGroup]="loginForm"
                (ngSubmit)="onSubmit()"
              >
                <div class="mb-3">
                  <label for="email">Email</label>
                  <input
                    type="email"
                    formControlName="email"
                    class="form-control"
                    id="email"
                    placeholder="Entrez votre email"
                  />
                  <div *ngIf="submitted && f.email.errors" class="error">
                    <div *ngIf="f.email.errors.required">L'email est requis</div>
                    <div *ngIf="f.email.errors.email">
                      Entrez une adresse email valide
                    </div>
                  </div>
                </div>

                <div class="mb-3">
                  <label for="password">Mot de passe</label>
                  <div class="input-group auth-pass-inputgroup">
                    <input
                      class="form-control"
                      [type]="fieldTextType ? 'text' : 'password'"
                      formControlName="password"
                      placeholder="Entrez votre mot de passe"
                    />
                    <button
                      type="button"
                      class="btn btn-outline-secondary"
                      (click)="toggleFieldTextType()"
                    >
                      <i class="mdi" [ngClass]="fieldTextType ? 'mdi-eye-off' : 'mdi-eye'"></i>
                    </button>
                  </div>
                  <div *ngIf="submitted && f.password.errors" class="error">
                    <div *ngIf="f.password.errors.required">
                      Le mot de passe est requis
                    </div>
                  </div>
                </div>

                <div *ngIf="error" class="error-message">
                  {{ error }}
                </div>

                <div class="form-check">
                  <input
                    class="form-check-input"
                    type="checkbox"
                    id="remember-check"
                  />
                  <label class="form-check-label" for="remember-check">
                    Se souvenir de moi
                  </label>
                </div>

                <div id="elmLoader" class="text-center d-none">
                  <div
                    class="spinner-border text-primary avatar-sm"
                    role="status"
                  >
                    <span class="visually-hidden">Chargement...</span>
                  </div>
                </div>

                <div class="mt-3 d-grid">
                  <button class="btn btn-primary" [disabled]="loading" type="submit">
                    Connexion
                  </button>
                </div>

                <div class="mt-4 text-center">
                  <a routerLink="/forgot-password" class="text-muted">
                    <i class="mdi mdi-lock mr-1"></i> Mot de passe oublié ?
                  </a>
                </div>
              </form>
            </div>
          </div>
        </div>

        
      </div>
    </div>
  </div>
</div>
